name: Blog Auto Crawl

on:
  schedule:
    - cron: "0 15 1 * *"  # 매월 1일 KST 자정 (UTC 15:00)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ai_server/requirements.txt

      - name: Run crawler
        run: python ai_server/app/services/crawler.py

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_server/data/blog_*.md
          if git diff --cached --quiet; then
            echo "변경된 블로그 데이터 없음"
          else
            git commit -m "🔧 chore: 블로그 데이터 자동 업데이트"
            git push
          fi
